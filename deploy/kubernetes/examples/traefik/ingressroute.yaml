apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mhserveremu
  namespace: mhserveremu
spec:
  entryPoints:
    - websecure
  tls:
    secretName: mhserveremu-tls
  routes:
    - match: Host(`mhserveremu.localdev`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: mhserveremu
          port: 8080
    - match: Host(`static.mhserveremu.localdev`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: mhserveremu-static
          port: 80
