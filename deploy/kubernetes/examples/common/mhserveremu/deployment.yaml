---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mhserveremu-static
  namespace: mhserveremu
  labels:
    app: mhserveremu-static
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mhserveremu-static
  template:
    metadata:
      labels:
        app: mhserveremu-static
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: static-files
          configMap:
            name: mhserveremu-static-files
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mhserveremu
  namespace: mhserveremu
  labels:
    app: mhserveremu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mhserveremu
  template:
    metadata:
      labels:
        app: mhserveremu
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mhserveremu
          image: docker.io/zkoesters/mhserveremu:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false  # MHServerEmu writes Config.ini at startup
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          env:
            - name: FRONTEND_BIND_IP
              value: "0.0.0.0"
            - name: WEBFRONTEND_ADDRESS
              value: "*"
            - name: FRONTEND_PUBLIC_ADDRESS
              value: "fe.mhserveremu.localdev"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: game-tcp
              containerPort: 4306
              protocol: TCP
            - name: game-udp
              containerPort: 4306
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /ServerStatus
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ServerStatus
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
          stdin: true
          tty: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mhserveremu-data
