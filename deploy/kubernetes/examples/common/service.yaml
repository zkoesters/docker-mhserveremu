apiVersion: v1
kind: Service
metadata:
  name: mhserveremu
  namespace: mhserveremu
  labels:
    app: mhserveremu
spec:
  type: ClusterIP
  selector:
    app: mhserveremu
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: frontend-tcp
      port: 4306
      targetPort: game-tcp
      protocol: TCP
    - name: frontend-udp
      port: 4306
      targetPort: game-udp
      protocol: UDP
