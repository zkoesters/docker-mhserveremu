apiVersion: apps/v1
kind: Deployment
metadata:
  name: mhserveremu-static
  namespace: mhserveremu
  labels:
    app: mhserveremu-static
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mhserveremu-static
  template:
    metadata:
      labels:
        app: mhserveremu-static
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: static-files
          configMap:
            name: mhserveremu-static-files
