# httpd.conf — Minimal Apache config for MHServerEmu reverse proxy.
#
# This config is designed to run inside the official httpd:2 Docker image
# and is used as a full replacement for the default httpd.conf when bind-
# mounted into the container. Do not assume defaults from the stock base
# config unless they are explicitly defined here.

ServerRoot "/usr/local/apache2"
Listen 80
Listen 443

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule headers_module modules/mod_headers.so

ServerAdmin admin@mhserveremu.localdev
ServerName mhserveremu.localdev

TypesConfig conf/mime.types

ErrorLog /proc/self/fd/2
LogLevel warn
CustomLog /proc/self/fd/1 combined
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined

SSLSessionCache shmcb:/usr/local/apache2/logs/ssl_scache(512000)

# ── HTTP to HTTPS redirects ────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName mhserveremu.localdev
    Redirect permanent / https://mhserveremu.localdev/
</VirtualHost>

<VirtualHost *:80>
    ServerName static.mhserveremu.localdev
    Redirect permanent / https://static.mhserveremu.localdev/
</VirtualHost>

# ── Reverse proxy for MHServerEmu API ──────────────────────────────────────

<VirtualHost *:443>
    ServerName mhserveremu.localdev
    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/certs/server.crt"
    SSLCertificateKeyFile "/usr/local/apache2/certs/server.key"

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RewriteEngine on
    RewriteRule ^/AuthServer(.*) http://mhserveremu:8080$1 [P]
    ProxyPass        / http://mhserveremu:8080/
    ProxyPassReverse / http://mhserveremu:8080/
</VirtualHost>

# ── Static file server ─────────────────────────────────────────────────────

<VirtualHost *:443>
    ServerName static.mhserveremu.localdev
    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/certs/server.crt"
    SSLCertificateKeyFile "/usr/local/apache2/certs/server.key"

    DocumentRoot "/usr/local/apache2/htdocs"
    <Directory "/usr/local/apache2/htdocs">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
