name: Docker Image CI
on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "Dockerfile.alpine"
      - "docker-entrypoint.sh"
      - "start-server"
      - "**/Config.ini.template"
      - "Makefile"
  workflow_dispatch:
jobs:
  build:
    uses: ./.github/workflows/docker-build-push.yml
    permissions:
      actions: write
      contents: read
      packages: write
      attestations: write
      id-token: write
    with:
      matrix: >-
        [
          {"version": "1.0.0",        "version_dir": "1.0.0", "branch": "1.0.0",  "dockerfile": "Dockerfile"},
          {"version": "1.0.0-alpine", "version_dir": "1.0.0", "branch": "1.0.0",  "dockerfile": "Dockerfile.alpine"},
          {"version": "1.0.1",        "version_dir": "1.0.1", "branch": "1.0.1",  "dockerfile": "Dockerfile"},
          {"version": "1.0.1-alpine", "version_dir": "1.0.1", "branch": "1.0.1",  "dockerfile": "Dockerfile.alpine"}
        ]
    secrets:
      RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
